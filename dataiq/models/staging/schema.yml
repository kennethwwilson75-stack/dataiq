version: 2

models:
  - name: stg_taxi_trips
    description: Cleaned and filtered taxi trip data
    columns:
      - name: vendor_id
        description: Taxi vendor identifier
        tests:
          - not_null
      - name: pickup_datetime
        description: Trip pickup timestamp
        tests:
          - not_null
      - name: trip_duration_minutes
        description: Calculated trip duration in minutes
        tests:
          - not_null
          - dbt_utils.accepted_range:
              arguments:
                min_value: 0
                max_value: 300
              config:
                severity: warn
      - name: fare_amount
        description: Base fare amount
        tests:
          - not_null
          - dbt_utils.accepted_range:
              arguments:
                min_value: 0
                max_value: 500
              config:
                severity: error
      - name: passenger_count
        description: Number of passengers
        tests:
          - not_null
          - dbt_utils.accepted_range:
              arguments:
                min_value: 1
                max_value: 8
              config:
                severity: warn
